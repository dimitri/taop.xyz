baseURL = "https://theartofpostgresql.com/"
languageCode = "en-us"
title = "The Art of PostgreSQL"
theme = "taop"
publishDir = "docs"

# PygmentsCodeFences = true
# pygmentsstyle = "autumn"

pygmentsCodefences=true
pygmentsStyle="solarized-dark"

[permalinks]
  post = "/blog/:year/:month/:slug/"

page = "/:contentbasename/"
  conf = "/conf/:slug/"
  fr = "/fr/:contentbasename/"

[taxonomies]
  tag = "tags"
  category = "categories"
  archive = "archives"

[author]
  name = "Dimitri Fontaine"
  bio = "PostgreSQL Major Contributor"
  job = "Open Source Software Engineer"
  location = "France"
  gravatarEmail = "dim@tapoueh.org"
  twitter = "tapoueh"
  googlePlus = "+DimitriFontaine"


[params]
  dateFormat = "Monday 02 Jan 2006"
  clearReading = false
  hierarchicalCategories = true
  favicon = "/favicon.ico"

[markup]
  defaultMarkdownHandler = 'goldmark'
  [markup.goldmark]
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
      xhtml = false
